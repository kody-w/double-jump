name: harness

# The autonomous double-jump loop: on a schedule (and on demand), find the WEAKEST Moment in the
# warehouse and append a stronger one that leapfrogs it by a margin. Git is the harness — every
# improvement is an append-only commit, so the repo history IS the record of the population improving.

on:
  workflow_dispatch:
    inputs:
      rounds:
        description: 'How many improvement rounds'
        required: false
        default: '1'
  schedule:
    - cron: '0 */6 * * *'    # every 6 hours

permissions:
  contents: write

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run the double-jump loop
        run: |
          python3 -m harness.loop --rounds "${{ github.event.inputs.rounds || '1' }}"

      - name: Commit improvement
        run: |
          if [[ -z "$(git status --porcelain warehouse/)" ]]; then
            echo "No improvement to commit."
            exit 0
          fi
          git config user.name  "double-jump-harness"
          git config user.email "actions@github.com"
          git add warehouse/
          git commit -m "harness: double-jumped the weakest ($(date -u +%FT%TZ)) [skip ci]"
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then break; fi
            echo "push race (attempt $attempt) — retrying"; sleep 3
          done
